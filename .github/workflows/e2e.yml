name: E2E — Forseti Integration Test

# Manual trigger or scheduled (daily at 7AM Bangkok = midnight UTC)
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target server URL"
        default: "https://dev.myhero.megawiz.co.th"
        type: string
  schedule:
    - cron: "0 17 * * 1-5"  # Mon-Fri 17:00 UTC = 00:00 Bangkok (next day)

env:
  PYTHON_VERSION: "3.12"

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout Forseti
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Forseti
        run: pip install -e ".[dev]"

      - name: Run E2E Tests
        env:
          E2E_BASE_URL: ${{ inputs.base_url || 'https://dev.myhero.megawiz.co.th' }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: python run_e2e.py

      - name: Upload ISO Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forseti-e2e-report
          path: reports/SI-04_SIT_*.md
          retention-days: 30

      - name: Upload SQLite Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forseti-results-db
          path: forseti_results.db
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## ⚖️ Forseti E2E Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Extract last line of run_e2e output for summary
          cat reports/SI-04_SIT_*.md | head -20 >> $GITHUB_STEP_SUMMARY || true
