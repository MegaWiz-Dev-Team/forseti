# Cloud Super Hero — E2E API Test Script (Structured)
# ⚖️ Forseti YAML Test Script
# Target: cloud-super-hero-dev (ห้าม production)
# Reference: SI-04_E2E.md (52 test cases, 20 scenarios)

suite_name: "Cloud Super Hero E2E"

name: "Cloud Super Hero E2E — API Tests"
base_url: "http://localhost:8080"
phase: SIT

metadata:
  project: cloud-super-hero-dev
  batch_id: DEV-BATCH-01
  program_id: dev-test-program
  admin_email: paripol@megawiz.co
  student_email: paripol.toopiroh@gmail.com

scenarios:
  # ── Scenario 1: Student Registration ──
  - name: "TC_E2E_01 — Student Email Check (Existing)"
    method: POST
    path: "/api/student/check-email"
    body:
      email: "paripol.toopiroh@gmail.com"
    expected_status: 200
    tags: [registration, student, smoke]

  - name: "TC_E2E_02 — Student Email Check (Not Found)"
    method: POST
    path: "/api/student/check-email"
    body:
      email: "nobody@test.invalid"
    expected_status: 404
    tags: [registration, student, negative]

  # ── Scenario 2: Student Profile ──
  - name: "TC_E2E_07 — Get Student Profile"
    method: GET
    path: "/api/student/paripol.toopiroh@gmail.com/profile"
    expected_status: 200
    tags: [profile, student]

  - name: "TC_E2E_08 — Update Profile Phone"
    method: POST
    path: "/api/student/update-profile"
    body:
      email: "paripol.toopiroh@gmail.com"
      phone: "0891234567"
    expected_status: 200
    tags: [profile, student]

  - name: "TC_E2E_09 — Accept PDPA Consent"
    method: POST
    path: "/api/student/consent"
    body:
      email: "paripol.toopiroh@gmail.com"
    expected_status: 200
    tags: [profile, student, consent]

  # ── Scenario 3: DISC Test ──
  - name: "TC_E2E_11 — Save DISC Result"
    method: POST
    path: "/api/student/disc"
    body:
      email: "paripol.toopiroh@gmail.com"
      batchId: "DEV-BATCH-01"
      type: "D"
      label: "Dominant"
      scores:
        D: 45
        I: 20
        S: 20
        C: 15
      numQuestions: 20
    expected_status: 200
    tags: [disc, student]

  - name: "TC_E2E_12 — Invalid DISC Type"
    method: POST
    path: "/api/student/disc"
    body:
      email: "paripol.toopiroh@gmail.com"
      batchId: "DEV-BATCH-01"
      type: "X"
    expected_status: 400
    tags: [disc, student, validation]

  # ── Scenario 4: Quiz ──
  - name: "TC_E2E_13 — Load Quiz Config"
    method: GET
    path: "/api/quiz/DEV-BATCH-01/pretest"
    expected_status: 200
    tags: [quiz, student]

  # ── Scenario 5: Attendance Report ──
  - name: "TC_E2E_21 — Get Attendance Report"
    method: GET
    path: "/api/admin/batch/DEV-BATCH-01/attendance"
    needs_auth: true
    expected_status: 200
    tags: [attendance, admin]

  # ── Scenario 6: Feedback ──
  - name: "TC_E2E_38 — Submit Feedback"
    method: POST
    path: "/api/student/feedback"
    body:
      email: "paripol.toopiroh@gmail.com"
      batchId: "DEV-BATCH-01"
      rating: 5
      nps: 9
      comment: "E2E test — ยอดเยี่ยมมาก"
    expected_status: 200
    tags: [feedback, student]

  - name: "TC_E2E_39 — Get Feedback Report"
    method: GET
    path: "/api/admin/batch/DEV-BATCH-01/feedback"
    needs_auth: true
    expected_status: 200
    tags: [feedback, admin]

  # ── Scenario 7: Admin Batch Management ──
  - name: "TC_E2E_42 — List Batches"
    method: GET
    path: "/api/admin/batches"
    needs_auth: true
    expected_status: 200
    tags: [batch, admin, smoke]

  - name: "TC_E2E_43 — Get Batch Detail"
    method: GET
    path: "/api/admin/batch/DEV-BATCH-01"
    needs_auth: true
    expected_status: 200
    tags: [batch, admin]

  - name: "TC_E2E_44 — Batch Not Found"
    method: GET
    path: "/api/admin/batch/NONEXISTENT"
    needs_auth: true
    expected_status: 404
    tags: [batch, admin, negative]

  # ── Scenario 8: Program Management ──
  - name: "TC_E2E_45 — List Programs"
    method: GET
    path: "/api/programs"
    expected_status: 200
    tags: [program, smoke]

  - name: "TC_E2E_46 — Update Program emailConfig"
    method: PUT
    path: "/api/programs/dev-test-program"
    needs_auth: true
    body:
      emailConfig:
        brandName: "My Hero DEV Test"
        footerText: "Testing Footer"
    expected_status: 200
    tags: [program, admin]

  - name: "TC_E2E_47 — Get Program Materials"
    method: GET
    path: "/api/programs/dev-test-program/materials"
    needs_auth: true
    expected_status: 200
    tags: [program, admin]

  # ── Scenario 9: Email Dry Runs ──
  - name: "TC_E2E_28 — Invitation Dry Run"
    method: POST
    path: "/api/admin/batch/DEV-BATCH-01/send-invitations"
    needs_auth: true
    body:
      dryRun: true
    expected_status: 200
    tags: [email, admin, dry-run]

  - name: "TC_E2E_30 — Reminder Dry Run"
    method: POST
    path: "/api/admin/batch/DEV-BATCH-01/send-reminders"
    needs_auth: true
    body:
      dryRun: true
    expected_status: 200
    tags: [email, admin, dry-run]

  - name: "TC_E2E_32 — Score Announcement Dry Run"
    method: POST
    path: "/api/admin/batch/DEV-BATCH-01/announce-scores"
    needs_auth: true
    body:
      dryRun: true
    expected_status: 200
    tags: [email, admin, dry-run]

  - name: "TC_E2E_34 — Certificate Dry Run"
    method: POST
    path: "/api/admin/batch/DEV-BATCH-01/send-certificates"
    needs_auth: true
    body:
      dryRun: true
    expected_status: 200
    tags: [email, admin, dry-run]

  # ── Scenario 10: Email Reset ──
  - name: "TC_E2E_36 — Reset Invitation Email Status"
    method: POST
    path: "/api/admin/batch/DEV-BATCH-01/reset-email"
    needs_auth: true
    body:
      type: "invitation"
      emails:
        - "paripol.toopiroh@gmail.com"
    expected_status: 200
    tags: [email, admin, reset]

  # ── Scenario 11: Grading ──
  - name: "TC_E2E_26 — Manual Grade"
    method: POST
    path: "/api/admin/grade"
    needs_auth: true
    body:
      email: "paripol.toopiroh@gmail.com"
      batchId: "DEV-BATCH-01"
      assignmentId: "hw1"
      score: 85
      maxScore: 100
      feedback: "E2E test grading — good work"
    expected_status: 200
    tags: [grading, admin]

  # ── Scenario 12: Public Registration ──
  - name: "TC_E2E_49 — Public Self-Registration"
    method: POST
    path: "/api/public/register"
    body:
      email: "new-student@test.invalid"
      name: "E2E นักเรียนใหม่"
      batchId: "DEV-SP-BATCH"
    expected_status: 200
    tags: [registration, public]

  # ── Scenario 13: Security ──
  - name: "TC_E2E_50 — Unauthorized Admin Access"
    method: GET
    path: "/api/admin/batches"
    needs_auth: false
    expected_status: 401
    tags: [security, negative]

  - name: "TC_E2E_52 — Invalid Batch (No Auth)"
    method: GET
    path: "/api/admin/batch/NONEXISTENT"
    needs_auth: false
    expected_status: 401
    tags: [security, negative]
